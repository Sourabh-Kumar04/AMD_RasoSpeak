<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>RasoSpeak — Chat</title>
  <link rel="icon" type="image/png" href="logo.png"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    body { background: #FAFAFA; }
    .nav-link { @apply px-4 py-2 rounded-lg text-sm font-medium transition-colors; }
    .nav-link:hover { @apply bg-gray-100; }
    .nav-link.active { @apply bg-emerald-50 text-emerald-700; }
    .chat-bubble { max-width: 85%; word-wrap: break-word; }
    .chat-bubble.user { @apply ml-auto bg-emerald-500 text-white rounded-2xl rounded-br-sm; }
    .chat-bubble.raso { @apply mr-auto bg-white border border-gray-200 rounded-2xl rounded-bl-sm; }
    .chat-bubble.error { @apply mr-auto bg-red-50 border border-red-200 text-red-700; }
    .typing-indicator span { @apply inline-block w-2 h-2 bg-gray-400 rounded-full animate-bounce; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  </style>
</head>
<body class="min-h-screen">

<!-- Navigation -->
<nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
  <div class="max-w-5xl mx-auto px-6">
    <div class="flex items-center justify-between h-16">
      <a href="index.html" class="flex items-center gap-3">
        <img src="logo.png" alt="RasoSpeak" class="w-8 h-8">
        <span class="font-bold text-lg">RasoSpeak</span>
      </a>
      <div class="flex items-center gap-1">
        <a href="index.html" class="nav-link">Home</a>
        <a href="chat.html" class="nav-link active">Chat</a>
        <a href="memory.html" class="nav-link">Memory</a>
        <a href="coach.html" class="nav-link">Coach</a>
        <a href="docs.html" class="nav-link">Docs</a>
        <a href="settings.html" class="nav-link">Settings</a>
      </div>
    </div>
  </div>
</nav>

<!-- Main Content -->
<main class="max-w-3xl mx-auto px-6 py-8">

  <!-- Chat Header -->
  <div class="bg-white rounded-lg border border-gray-200 p-4 mb-6 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-emerald-100 rounded-full flex items-center justify-center">
        <span class="text-lg">🤝</span>
      </div>
      <div>
        <h2 class="font-semibold">Raso</h2>
        <p id="raso-status" class="text-xs text-gray-500">Your AI companion</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <select id="provider-select" class="px-3 py-1.5 border border-gray-200 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500">
        <option value="google">Google Gemini</option>
        <option value="nvidia">NVIDIA NIM</option>
        <option value="openai">OpenAI GPT</option>
        <option value="anthropic">Anthropic Claude</option>
        <option value="openrouter">OpenRouter</option>
        <option value="deepseek">DeepSeek</option>
      </select>
      <button onclick="clearChat()" class="px-3 py-1.5 bg-gray-100 rounded-lg text-sm hover:bg-gray-200 transition-colors">
        Clear
      </button>
    </div>
  </div>

  <!-- Chat Messages -->
  <div id="chat-messages" class="bg-white rounded-lg border border-gray-200 p-6 mb-6 min-h-[50vh] max-h-[60vh] overflow-y-auto space-y-4">
    <div id="welcome-message" class="text-center text-gray-400 py-12">
      <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <span class="text-2xl">🤝</span>
      </div>
      <p class="mb-2 font-medium">Raso is ready to chat!</p>
      <p class="text-sm">Try: "Hey Raso, what is machine learning?"</p>
      <p class="text-xs mt-4 text-gray-400">Or say "Hey Raso" to activate voice control</p>
    </div>
  </div>

  <!-- Chat Input -->
  <div class="bg-white rounded-lg border border-gray-200 p-4">
    <div class="flex gap-3">
      <input type="text" id="chat-input" placeholder="Ask Raso anything..."
        class="flex-1 px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500"
        onkeydown="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }">
      <button id="send-btn" onclick="sendMessage()" class="px-6 py-3 bg-emerald-500 text-white rounded-lg font-medium hover:bg-emerald-600 transition-colors flex items-center gap-2">
        <span>Send</span>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
        </svg>
      </button>
    </div>
    <div class="flex items-center justify-between mt-3">
      <p class="text-xs text-gray-400">Press Enter to send, Shift+Enter for new line</p>
      <div class="flex gap-2">
        <button id="audio-record-btn" onclick="toggleAudioRecording()" class="px-3 py-1.5 bg-gray-100 rounded-lg text-sm hover:bg-gray-200 transition-colors flex items-center gap-2" title="Record conversation to memory">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
          </svg>
          <span>Record</span>
        </button>
        <button id="voice-btn" onclick="toggleVoice()" class="px-3 py-1.5 bg-gray-100 rounded-lg text-sm hover:bg-gray-200 transition-colors flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
          </svg>
          <span>Voice</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="mt-6">
    <p class="text-sm text-gray-500 mb-3">Quick questions:</p>
    <div class="flex flex-wrap gap-2">
      <button onclick="quickAsk('What can you help me with?')" class="py-2 px-4 bg-gray-100 rounded-lg text-sm hover:bg-gray-200 transition-colors">Help me</button>
      <button onclick="quickAsk('Tell me a joke')" class="py-2 px-4 bg-gray-100 rounded-lg text-sm hover:bg-gray-200 transition-colors">Tell me a joke</button>
      <button onclick="quickAsk('Search the web for latest AI news')" class="py-2 px-4 bg-gray-100 rounded-lg text-sm hover:bg-gray-200 transition-colors">AI News</button>
      <button onclick="quickAsk('What did I last ask you about?')" class="py-2 px-4 bg-gray-100 rounded-lg text-sm hover:bg-gray-200 transition-colors">Recall memory</button>
      <button onclick="quickAsk('Summarize our conversation')" class="py-2 px-4 bg-gray-100 rounded-lg text-sm hover:bg-gray-200 transition-colors">Summarize</button>
    </div>
  </div>

</main>

<!-- Toast -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full text-sm font-medium shadow-xl transition-all duration-300 opacity-0 pointer-events-none translate-y-4 z-50"></div>

<!-- Scripts -->
<script src="state.js"></script>
<script src="nlp.js"></script>
<script src="speech.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>

<script>
let conversationHistory = [];
let isTyping = false;
let voiceEnabled = false;
let recognition = null;
let synthesis = window.speechSynthesis;

// Toast notification
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
  setTimeout(() => t.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none'), 3000);
}

// Escape HTML
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Add message to chat
function addMessage(role, content, isError = false) {
  const messagesContainer = document.getElementById('chat-messages');
  const welcome = document.getElementById('welcome-message');
  if (welcome) welcome.remove();

  const messageDiv = document.createElement('div');
  const bubbleClass = isError ? 'chat-bubble error' : `chat-bubble ${role}`;

  messageDiv.innerHTML = `
    <div class="${bubbleClass} px-4 py-3">
      <p class="whitespace-pre-wrap">${escapeHtml(content)}</p>
    </div>
    <p class="text-xs text-gray-400 mt-1 ${role === 'user' ? 'text-right' : ''}">
      ${role === 'user' ? 'You' : 'Raso'} • Just now
    </p>
  `;

  messagesContainer.appendChild(messageDiv);
  messagesContainer.scrollTop = messagesContainer.scrollHeight;

  // Speak Raso's response
  if (role === 'raso' && synthesis && !isError) {
    setTimeout(() => {
      const utterance = new SpeechSynthesisUtterance(content);
      utterance.rate = 0.95;
      utterance.pitch = 1;
      utterance.volume = 1;
      synthesis.speak(utterance);
    }, 100);
  }

  return messageDiv;
}

// Show typing indicator
function showTypingIndicator() {
  const messagesContainer = document.getElementById('chat-messages');
  const typingDiv = document.createElement('div');
  typingDiv.id = 'typing-indicator';
  typingDiv.innerHTML = `
    <div class="chat-bubble raso px-4 py-3">
      <div class="typing-indicator flex gap-1">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  `;
  messagesContainer.appendChild(typingDiv);
  messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

// Remove typing indicator
function removeTypingIndicator() {
  const indicator = document.getElementById('typing-indicator');
  if (indicator) indicator.remove();
}

// Send message
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const message = input.value.trim();

  if (!message) return;
  if (isTyping) return;

  // Add user message
  addMessage('user', message);
  input.value = '';

  // Add to history
  conversationHistory.push({ role: 'user', content: message });

  // Show typing
  isTyping = true;
  showTypingIndicator();

  // Get provider
  const provider = document.getElementById('provider-select').value;

  try {
    const resp = await fetch('/raso/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message,
        provider
      })
    });

    removeTypingIndicator();

    if (resp.ok) {
      const data = await resp.json();
      const answer = data.answer || data.response || 'I apologize, but I could not generate a response.';

      // Add assistant message
      addMessage('raso', answer);
      conversationHistory.push({ role: 'assistant', content: answer });

      // Save to memory
      await saveToMemory(message, answer);
    } else {
      const error = await resp.json().catch(() => ({ error: 'Request failed' }));
      addMessage('raso', error.error || 'Sorry, something went wrong.', true);
    }
  } catch (err) {
    removeTypingIndicator();
    addMessage('raso', 'Connection error. Please check your API settings.', true);
    console.error('Chat error:', err);
  }

  isTyping = false;
}

// Quick ask
function quickAsk(question) {
  document.getElementById('chat-input').value = question;
  sendMessage();
}

// Save to memory (both systems)
async function saveToMemory(userMsg, rasoMsg) {
  try {
    // Save to shared memory (backward compatibility)
    await fetch('/memory/store', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        key: `chat_${Date.now()}`,
        value: { user: userMsg, raso: rasoMsg, timestamp: new Date().toISOString() },
        category: 'conversation'
      })
    });

    // Save to Second Brain (enhanced memory)
    await fetch('/brain/conversation', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_input: userMsg,
        ai_response: rasoMsg,
        ai_provider: 'nvidia'
      })
    });
  } catch (err) {
    console.error('Failed to save to memory:', err);
  }
}

// Clear chat
function clearChat() {
  if (!confirm('Clear all messages?')) return;

  conversationHistory = [];
  const messagesContainer = document.getElementById('chat-messages');
  messagesContainer.innerHTML = `
    <div id="welcome-message" class="text-center text-gray-400 py-12">
      <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <span class="text-2xl">🤝</span>
      </div>
      <p class="mb-2 font-medium">Raso is ready to chat!</p>
      <p class="text-sm">Try: "Hey Raso, what is machine learning?"</p>
    </div>
  `;
  showToast('Chat cleared');
}

// Toggle voice input
async function toggleVoice() {
  if (voiceEnabled) {
    // Turn off
    voiceEnabled = false;
    const btn = document.getElementById('voice-btn');
    btn.classList.remove('bg-emerald-500', 'text-white');
    btn.classList.add('bg-gray-100');
    stopVoiceRecognition();
    showToast('Voice disabled');
    return;
  }

  // Turn on - request microphone permission first
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    stream.getTracks().forEach(track => track.stop());
  } catch (err) {
    showToast('Microphone permission denied');
    return;
  }

  // Check for Web Speech API
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showToast('Voice not supported in this browser');
    return;
  }

  // Enable and start
  voiceEnabled = true;
  const btn = document.getElementById('voice-btn');
  btn.classList.add('bg-emerald-500', 'text-white');
  btn.classList.remove('bg-gray-100');
  showToast('Voice enabled - speak now');

  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (event) => {
    let transcript = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        transcript += event.results[i][0].transcript + ' ';
      }
    }
    if (transcript.trim()) {
      document.getElementById('chat-input').value = transcript.trim();
      sendMessage();
    }
  };

  recognition.onerror = (event) => {
    console.error('Voice error:', event.error);
    // Network errors are expected in some environments - don't spam user
    const ignorable = ['no-speech', 'aborted', 'network'];
    if (!ignorable.includes(event.error)) {
      showToast('Voice error: ' + event.error);
    }
    if (voiceEnabled && event.error !== 'network') {
      setTimeout(() => { try { recognition.start(); } catch(e) {} }, 1000);
    } else if (event.error === 'network') {
      // Network error - try to restart after longer delay
      setTimeout(() => {
        if (voiceEnabled) {
          try { recognition.start(); } catch(e) {}
        }
      }, 5000);
    }
  };

  recognition.onend = () => {
    if (voiceEnabled) {
      setTimeout(() => { try { recognition.start(); } catch(e) {} }, 500);
    }
  };

  recognition.start();
}

// Stop voice recognition
function stopVoiceRecognition() {
  if (recognition) {
    try { recognition.stop(); } catch(e) {}
    recognition = null;
  }
}

// Audio recording for second brain
let audioRecorder = null;
let audioChunks = [];
let isRecordingAudio = false;

async function toggleAudioRecording() {
  const btn = document.getElementById('audio-record-btn');

  if (isRecordingAudio) {
    // Stop recording
    isRecordingAudio = false;
    btn.classList.remove('bg-red-500', 'text-white');
    btn.classList.add('bg-gray-100');
    showToast('Audio recording saved');

    if (audioRecorder && audioRecorder.state !== 'inactive') {
      audioRecorder.stop();
    }
    return;
  }

  // Start recording
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioRecorder = new MediaRecorder(stream);
    audioChunks = [];

    audioRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) {
        audioChunks.push(e.data);
      }
    };

    audioRecorder.onstop = async () => {
      const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
      const reader = new FileReader();

      reader.onloadend = async () => {
        const base64 = reader.result.split(',')[1];

        // For now, we'll store the conversation transcript
        // In production, you'd send audio to transcription service
        const lastConvs = conversationHistory.slice(-5);
        const transcript = lastConvs.map(c => `${c.role}: ${c.content}`).join('\n');

        try {
          await fetch('/brain/audio', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              session_id: 'chat_' + Date.now(),
              transcription: transcript,
              speakers: ['user', 'raso'],
              duration: 0
            })
          });
          showToast('Audio conversation stored in memory');
        } catch (err) {
          console.error('Failed to store audio conversation:', err);
        }
      };

      reader.readAsDataURL(audioBlob);
    };

    audioRecorder.start();
    isRecordingAudio = true;
    btn.classList.add('bg-red-500', 'text-white');
    btn.classList.remove('bg-gray-100');
    showToast('Recording audio conversation...');

  } catch (err) {
    showToast('Failed to start audio recording');
    console.error('Audio recording error:', err);
  }
}

// Initialize
window.addEventListener('load', async () => {
  // Check available providers
  try {
    const resp = await fetch('/qa/providers');
    if (resp.ok) {
      const data = await resp.json();
      const providers = data.available || [];

      if (providers.length > 0) {
        document.getElementById('provider-select').innerHTML = providers.map(p =>
          `<option value="${p}">${p.charAt(0).toUpperCase() + p.slice(1)}</option>`
        ).join('');
      }
    }
  } catch (err) {
    console.log('Using default providers');
  }
});
</script>

</body>
</html>
